<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Ghibli Explorer</title>
    <link rel="icon" href="assets/img/logo.png">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Studio Ghibli Explorer" />
    <meta property="og:description" content="Explore Studio Ghibli films, characters, locations, species, and vehicles in a clean minimalist interface." />
    <meta property="og:image" content="assets/img/logo.png" />
    <meta property="og:url" content="https://your-domain.com/" />
    <meta property="og:site_name" content="Ghibli Explorer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Studio Ghibli Explorer" />
    <meta name="twitter:description" content="Explore Studio Ghibli films, characters, and more in a beautiful interface." />
    <meta name="twitter:image" content="assets/img/logo.png" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="assets/css/main.css" rel="stylesheet">
</head>
<body>
    <header id="header" class="header d-flex align-items-center fixed-top">
        <div class="container position-relative d-flex align-items-center justify-content-between">

        <a href="index.html" class="logo d-flex align-items-center me-auto me-xl-0">
            <h1 class="sitename">Ghibli Explorer</h1>
        </a>

        <a class="btn-getstarted" href="https://ghibliapi.dev/">API</a>

        </div>
    </header>
    <main class="main">
        <section class="section">
            <!-- Section Title -->
            <div class="container section-title" data-aos="fade-up">
                <h2>Explore</h2>
                <p>Get to know some movie classics (Descriptions, scores and more)</p>
            </div>
            <!-- End Section Title -->
            <div class="container py-5">

                <div class="container my-4">

                    <div class="row g-3 align-items-center">

                        <!-- Search -->
                        <div class="col-md-4">
                            <input type="text"
                                id="searchInput"
                                class="form-control"
                                placeholder="Search movies..." />
                        </div>

                        <!-- Director Filter -->
                        <div class="col-md-4">
                            <select id="directorFilter" class="form-select">
                                <option value="">All Directors</option>
                            </select>
                        </div>

                        <!-- Sort -->
                        <div class="col-md-4">
                            <select id="sortFilter" class="form-select">
                                <option value="">Sort By</option>
                                <option value="year-asc">Year ↑</option>
                                <option value="year-desc">Year ↓</option>
                                <option value="score-desc">Score ↓</option>
                                <option value="score-asc">Score ↑</option>
                                <option value="title-asc">Title A-Z</option>
                                <option value="title-desc">Title Z-A</option>
                            </select>
                        </div>

                    </div>

                </div>

                <hr>

                <div id="movies" class="row g-4"></div>

                <div
                    id="pagination"
                    class="d-flex justify-content-center my-5">
                </div>

            </div>
        </section>
    </main>
    <footer id="footer" class="footer light-background">

        <div class="footer-top">
        <div class="container">
            <div class="row gy-4">
            <div class="col-lg-4 col-md-4 footer-about">
                <img src="assets/img/logo.png" class="img-fluid"/>
            </div>

            <div class="col-lg-4 col-md-4 footer-links">
                <h4>Other projects</h4>
                <ul>
                <li><a href="https://github.com/miguelestradam3/pokedex">Pokedex</a></li>
                <li><a href="https://github.com/miguelestradam3/machine_learning_classifier">Jupyter - Machine Learning</a></li>
                <li><a href="https://github.com/miguelestradam3/rick_and_morty">Rick and Morty</a></li>
                <li><a href="https://github.com/miguelestradam3/python_images_editor">Python</a></li>
                </ul>
            </div>

            <div class="col-lg-4 col-md-4 footer-links">
                <h4>Technologies used in this project</h4>
                <ul>
                <li><a href="#">HTML</a></li>
                <li><a href="#">CSS</a></li>
                <li><a href="#">Javascript</a></li>
                <li><a href="#">Bootstrap</a></li>
                </ul>
            </div>

            </div>
        </div>
        </div>

        <div class="copyright text-center">
        <div class="container d-flex flex-column flex-lg-row justify-content-center justify-content-lg-between align-items-center">

            <div class="social-links order-first order-lg-last mb-3 mb-lg-0">
            <a href="https://www.linkedin.com/in/miguel-estrada-46ba46367/"><i class="bi bi-linkedin"></i></a>
            <a href="https://github.com/miguelestradam3"><i class="bi bi-github"></i></a>
            </div>

        </div>
        </div>

    </footer>
    <script src="assets/js/app.js"></script>.
    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>
</html>
